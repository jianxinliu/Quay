name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra keyring

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      # 类型检查目前是基线（非阻塞）：多为有意的「guarded Optional」模式，mypy 跟不进
      # 运行时的 None 守卫。逐步收紧，暂不卡 CI。见 CONTRIBUTING.md。
      - name: Type check (mypy, baseline / non-blocking)
        run: uv run mypy
        continue-on-error: true

      - name: Test (pytest)
        run: uv run pytest -q
