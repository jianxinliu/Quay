# Docker 部署配置：容器内用 host.docker.internal 访问宿主的数据库。
# 密码走 env://（compose 从 .env 或环境注入），Docker 内无 keyring 后端。
projects:
  local:
    connections:
      demo-mysql:
        engine: mysql
        host: host.docker.internal   # 容器 → 宿主 127.0.0.1:3306
        port: 3306
        database: dbm_e2e
        environment: dev
        user: root
        password: env://DBM_MYSQL_PW
        writer:
          user: root
          password: env://DBM_MYSQL_PW
        policy:
          max_rows: 500
          mask_columns: [email]
