# 连接配置示例。复制为 connections.yaml 后按需修改（connections.yaml 已被 gitignore）。
# 密码只能写引用，不能写明文：
#   env://VAR_NAME              环境变量（Docker 部署推荐，经 docker secret/env 注入）
#   keyring://service/account   系统钥匙串（裸机 stdio 模式）
#   plain://xxx                 字面量，仅限本地调试
projects:
  demo:
    connections:
      local-sqlite:
        engine: sqlite
        database: ./data/demo.sqlite3
        environment: local

      dev-mysql:
        engine: mysql
        host: 127.0.0.1
        port: 3306
        database: demo
        environment: dev
        user: demo_reader
        password: env://DEMO_MYSQL_PW
        policy:
          max_rows: 1000
          statement_timeout_s: 30

      prod-postgres:
        engine: postgres
        host: 10.0.3.12
        port: 5432
        database: shop
        environment: prod          # prod 默认关闭 elicitation 快捷审批，写操作必须走后台
        user: shop_reader
        password: env://SHOP_PG_READER_PW
        # 多层跳板，按序经过
        jump_hosts: [bastion1.corp, bastion2.corp]
        policy:
          mask_columns: [salary, phone]   # 业务敏感列（内置已覆盖 password/token/secret 等）

      analytics-clickhouse:
        engine: clickhouse
        host: 127.0.0.1
        port: 9000                 # native TCP 端口（不是 HTTP 的 8123）
        environment: dev
        user: default
        password: env://CH_PW      # default 用户无密码时可省略
        # database 可留空：查询台会列出所有库，进去再「库→表→列」自己选；
        # 也可绑定默认库（下行），进去直接是该库的表。
        # database: analytics
        policy:
          max_rows: 1000
          statement_timeout_s: 30   # 映射为 ClickHouse max_execution_time（只读防线另加 readonly=1）

      dev-redis:
        engine: redis
        host: 127.0.0.1
        port: 6379
        database: "0"              # db index
        environment: dev           # local/dev 默认开启 elicitation 快捷审批
        password: env://DEV_REDIS_PW   # 无 auth 的本地实例可省略
        # policy:
        #   elicitation_approval: false  # 显式关闭会话内快捷审批
